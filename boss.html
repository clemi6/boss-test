<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Niveau 5 : Le Boss Final</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100dvh;
        }

        h2 {
            margin: 10px 0 5px 0;
            font-size: 18px;
            flex-shrink: 0;
        }

        #topBar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        #fullscreenBtn {
            background-color: #3498db;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        #fullscreenBtn:active {
            background-color: #2980b9;
        }

        .instructions {
            font-size: 12px;
            color: #bdc3c7;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        #mainContent {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 100%;
            flex-grow: 1;
            background-color: #87CEEB;
        }

        #exitFullscreenBtn {
            display: none;
            position: absolute;
            top: 10px;
            right: 15px;
            background-color: rgba(231, 76, 60, 0.9);
            color: white;
            border: 2px solid #c0392b;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
        }

        #exitFullscreenBtn:active {
            background-color: rgba(192, 57, 43, 1);
            transform: scale(0.95);
        }

        #canvasWrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            min-height: 0;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: pointer;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            background: #1a252f;
            border-top: 4px solid #34495e;
            flex-shrink: 0;
            z-index: 10;
        }

        .d-pad,
        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            background-color: #7f8c8d;
            border: 2px solid #bdc3c7;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background-color: #e74c3c;
            transform: scale(0.95);
        }

        .btn-attack {
            background-color: #e67e22;
            border-color: #d35400;
        }

        #orientationWarning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: #1a252f;
            color: #f1c40f;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        @media screen and (orientation: portrait) {
            #orientationWarning {
                display: flex;
            }

            #mainContent {
                display: none !important;
            }
        }

        .pseudo-fullscreen {
            position: fixed !important;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw !important;
            height: 100dvh !important;
            max-width: none !important;
            z-index: 9999;
            margin: 0;
        }
    </style>
</head>

<body>

    <div id="orientationWarning">
        <div style="font-size: 50px; margin-bottom: 20px;">🔄</div>
        <div>Veuillez tourner votre téléphone<br>en mode paysage pour jouer !</div>
    </div>

    <div id="mainContent">
        <div id="topBar">
            <h2>Le Schweissdissi Enragé</h2>
            <button id="fullscreenBtn">📱 Jouer en Plein Écran</button>
        </div>
        <div class="instructions">Frappe-le 10 fois ou éjecte-le !</div>

        <div id="gameContainer">
            <button id="exitFullscreenBtn">❌ Quitter</button>
            <div id="canvasWrapper"><canvas id="gameCanvas" width="1000" height="500"></canvas></div>
            <div id="controls">
                <div class="d-pad">
                    <div class="btn" id="btnLeft">⬅️</div>
                    <div class="btn" id="btnRight">➡️</div>
                </div>
                <div class="action-buttons">
                    <div class="btn" id="btnJump">⬆️</div>
                    <div class="btn btn-attack" id="btnAttack">👊</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // ==============================================================
        // 🔴 RÉGLAGES DES SPRITES 🔴
        // ==============================================================
        const bossCols = 9;
        const bossRows = 5;
        const bossMortCols = 9;

        const BOSS_ANIM_WALK = 0;
        const BOSS_ANIM_JUMP = 1;
        const BOSS_ANIM_RANGE = 3;
        const BOSS_ANIM_MELEE = 4;
        const BOSS_OFFSET_Y = 0;

        const playerCols = 8;
        const playerRows = 4;
        const playerDegatCols = 8;
        const playerDegatRows = 4;
        const PLAYER_OFFSET_Y = 5;

        const pierreCols = 4;
        const pierreRows = 2;

        // Gestion du plein écran
        const fullscreenBtn = document.getElementById("fullscreenBtn");
        const exitFullscreenBtn = document.getElementById("exitFullscreenBtn");
        const gameContainer = document.getElementById("gameContainer");
        const topBar = document.getElementById("topBar");
        const instructions = document.querySelector(".instructions");

        fullscreenBtn.addEventListener("click", () => {
            gameContainer.classList.add("pseudo-fullscreen"); window.scrollTo(0, 0);
            topBar.style.display = "none"; instructions.style.display = "none"; document.body.style.backgroundColor = "#87CEEB"; exitFullscreenBtn.style.display = "block";
        });
        exitFullscreenBtn.addEventListener("click", () => {
            gameContainer.classList.remove("pseudo-fullscreen"); topBar.style.display = "flex"; instructions.style.display = "block"; document.body.style.backgroundColor = "#2c3e50"; exitFullscreenBtn.style.display = "none"; fullscreenBtn.style.display = "block"; resetGame();
        });

        // Contrôles
        const input = { left: false, right: false, jump: false, attack: false };
        window.addEventListener("keydown", (e) => { if (e.code === "ArrowLeft") input.left = true; if (e.code === "ArrowRight") input.right = true; if (e.code === "ArrowUp") input.jump = true; if (e.code === "Space") input.attack = true; });
        window.addEventListener("keyup", (e) => { if (e.code === "ArrowLeft") input.left = false; if (e.code === "ArrowRight") input.right = false; if (e.code === "ArrowUp") input.jump = false; if (e.code === "Space") input.attack = false; });

        const bindButton = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); input[key] = true; }); btn.addEventListener("touchend", (e) => { e.preventDefault(); input[key] = false; });
            btn.addEventListener("mousedown", () => input[key] = true); btn.addEventListener("mouseup", () => input[key] = false); btn.addEventListener("mouseleave", () => input[key] = false);
        };
        bindButton("btnLeft", "left"); bindButton("btnRight", "right"); bindButton("btnJump", "jump"); bindButton("btnAttack", "attack");

        window.addEventListener("mousedown", () => { if (gameOver || victory) resetGame(); });
        window.addEventListener("touchstart", (e) => { if (gameOver || victory) { resetGame(); } });

        // Variables Globales
        const gravity = 0.6; const friction = 0.8;
        let gameOver = false; let victory = false;
        const platform = { x: 50, y: 400, width: 900, height: 20 };
        const projectiles = [];

        // Chargement des Images
        const bossSprite = new Image(); bossSprite.src = "boss_sprite.png";
        const bossMortSprite = new Image(); bossMortSprite.src = "boss_mort_sprite.png";
        const playerSprite = new Image(); playerSprite.src = "player_sprite.png";
        const playerDegatSprite = new Image(); playerDegatSprite.src = "player_degat.png";
        const pierreSprite = new Image(); pierreSprite.src = "pierre_sprite.png";

        // Entités
        const player = {
            x: 200, y: 100, width: 40, height: 40, vx: 0, vy: 0, speed: 5, jumpPower: -12, isGrounded: false, direction: 1,
            attackCooldown: 0, isAttacking: false, invulnerable: 0, lives: 5, isHurt: false, hurtTimer: 0, isDead: false, frameX: 0, frameY: 0, frameTimer: 0, frameDuration: 4
        };

        const boss = {
            x: 700, y: 100, width: 60, height: 60, vx: 0, vy: 0, speed: 1.2, jumpPower: -10, isGrounded: false, direction: -1,
            actionTimer: 0, state: "idle", attackCooldown: 0, isAttacking: false, hp: 10, maxHp: 10, invulnerable: 0,
            frameX: 0, frameY: 0, frameTimer: 0, frameDuration: 4
        };

        function resetGame() {
            player.lives = 5; player.x = 200; player.y = 100; player.vx = 0; player.vy = 0; player.invulnerable = 60;
            player.frameX = 0; player.frameY = 0; player.frameTimer = 0; player.isAttacking = false; player.isHurt = false; player.isDead = false;
            boss.hp = boss.maxHp; boss.x = 700; boss.y = 100; boss.vx = 0; boss.vy = 0; boss.state = "idle";
            boss.frameX = 0; boss.frameY = 0; boss.frameTimer = 0; boss.isAttacking = false; boss.invulnerable = 0;
            projectiles.length = 0; gameOver = false; victory = false;
        }

        function loseLife() {
            if (player.invulnerable > 0 || player.isDead) return;
            player.lives--; player.invulnerable = 60;
            if (player.lives <= 0) { player.isDead = true; player.frameX = 0; player.frameY = 2; player.vx = 0; }
            else { player.isHurt = true; player.hurtTimer = 25; player.frameX = 0; player.frameY = 0; player.isAttacking = false; }
        }

        function update() {
            if (gameOver || victory) return;

            // --- JOUEUR ---
            if (player.invulnerable > 0) player.invulnerable--;
            if (player.attackCooldown > 0) player.attackCooldown--;

            if (player.isDead) {
                player.vx *= friction; player.x += player.vx; player.vy += gravity; player.y += player.vy; checkPlatform(player);
                player.frameTimer++; if (player.frameTimer > 8) { player.frameTimer = 0; if (player.frameX < playerDegatCols - 1) player.frameX++; else gameOver = true; }
            }
            else if (player.isHurt) {
                player.vx *= friction; player.x += player.vx; player.vy += gravity; player.y += player.vy; checkPlatform(player);
                player.hurtTimer--; if (player.hurtTimer <= 0) player.isHurt = false;
                player.frameTimer++; if (player.frameTimer > player.frameDuration) { player.frameTimer = 0; player.frameX = (player.frameX + 1) % playerDegatCols; }
            }
            else {
                if (!player.isAttacking) {
                    if (Math.abs(player.vx) < 4.5) { if (input.left) { player.vx -= 1; player.direction = -1; } if (input.right) { player.vx += 1; player.direction = 1; } }
                }
                player.vx *= friction; player.x += player.vx;
                if (input.jump && player.isGrounded && !player.isAttacking) { player.vy = player.jumpPower; player.isGrounded = false; }
                player.vy += gravity; player.y += player.vy;

                if (input.attack && player.attackCooldown === 0 && !player.isAttacking) {
                    player.isAttacking = true; player.attackCooldown = 30; player.frameX = 0; player.frameY = 3; player.frameTimer = 0; playerAttack();
                }

                player.frameTimer++; let currentPlayerDuration = (!player.isGrounded && !player.isAttacking) ? 18 : player.frameDuration;
                if (player.frameTimer >= currentPlayerDuration) {
                    player.frameTimer = 0;
                    if (player.isAttacking) { player.frameX++; if (player.frameX >= playerCols) { player.frameX = 0; player.isAttacking = false; } }
                    else { player.frameX = (player.frameX + 1) % playerCols; }
                }

                if (!player.isAttacking) { if (!player.isGrounded) player.frameY = 2; else if (Math.abs(player.vx) > 0.5) player.frameY = 0; else { player.frameY = 0; player.frameX = 0; } }
                else { player.frameY = 3; }
            }

            // --- BOSS MORT ---
            if ((boss.hp <= 0 || boss.y > canvas.height) && boss.state !== "dead") {
                boss.state = "dead";
                boss.frameX = 0;
                boss.frameTimer = 0;
                boss.vx = 0;
            }

            if (boss.state === "dead") {
                boss.vx *= friction; boss.x += boss.vx; boss.vy += gravity; boss.y += boss.vy;
                checkPlatform(boss);
                boss.frameTimer++;
                if (boss.frameTimer >= 8) {
                    boss.frameTimer = 0;
                    if (boss.frameX < bossMortCols - 1) boss.frameX++;
                    else victory = true;
                }
            } else {
                // --- BOSS ALIVE ---
                if (boss.invulnerable > 0) boss.invulnerable--;
                let dist = player.x - boss.x; boss.direction = dist > 0 ? 1 : -1;
                if (boss.attackCooldown > 0) boss.attackCooldown--;
                boss.actionTimer--;

                if (boss.actionTimer <= 0) {
                    let absDist = Math.abs(dist);
                    if (absDist < 80 && boss.attackCooldown === 0) { boss.state = "melee"; boss.actionTimer = 54; boss.frameX = 0; boss.frameTimer = 0; }
                    else if (absDist > 150 && boss.attackCooldown === 0 && Math.random() < 0.6) { boss.state = "range"; boss.actionTimer = 54; boss.frameX = 0; boss.frameTimer = 0; }
                    else { boss.actionTimer = 80 + Math.random() * 60; if (Math.random() > 0.4) boss.state = "chase"; else boss.state = "idle"; }
                    if (boss.isGrounded && Math.random() < 0.35 && boss.state !== "melee" && boss.state !== "range") { boss.vy = boss.jumpPower; boss.isGrounded = false; }
                }

                boss.isAttacking = false;
                if (boss.state === "chase" && Math.abs(boss.vx) < 4) boss.vx = boss.direction * boss.speed;
                else if (boss.state === "idle") boss.vx *= friction;
                else if (boss.state === "melee") { boss.vx *= 0.5; if (boss.frameX === 5 && boss.frameTimer === 1) { boss.isAttacking = true; bossAttackMelee(); boss.attackCooldown = 60; } }
                else if (boss.state === "range") { boss.vx *= 0.5; if (boss.frameX === 6 && boss.frameTimer === 1) { bossAttackRange(); boss.attackCooldown = 80; } }

                boss.frameTimer++;
                let currentBossDuration = (!boss.isGrounded) ? 6 : (boss.state === "melee" || boss.state === "range") ? 6 : boss.frameDuration;
                if (boss.frameTimer >= currentBossDuration) { boss.frameTimer = 0; boss.frameX = (boss.frameX + 1) % bossCols; }

                if (boss.state === "melee") boss.frameY = BOSS_ANIM_MELEE;
                else if (boss.state === "range") boss.frameY = BOSS_ANIM_RANGE;
                else {
                    if (!boss.isGrounded) boss.frameY = BOSS_ANIM_JUMP;
                    else if (Math.abs(boss.vx) > 0.5) boss.frameY = BOSS_ANIM_WALK;
                    else { boss.frameY = BOSS_ANIM_WALK; boss.frameX = 0; }
                }
                boss.vx *= friction; boss.x += boss.vx; boss.vy += gravity; boss.y += boss.vy;
                if (!player.isDead) {
                    if (player.y < boss.y + boss.height && player.y + player.height > boss.y && player.x < boss.x + boss.width && player.x + player.width > boss.x) {
                        let centerPlayer = player.x + player.width / 2; let centerBoss = boss.x + boss.width / 2;
                        let overlap = (player.width / 2 + boss.width / 2) - Math.abs(centerPlayer - centerBoss);
                        if (overlap > 0) { if (centerPlayer < centerBoss) { player.x -= overlap / 2; boss.x += overlap / 2; } else { player.x += overlap / 2; boss.x -= overlap / 2; } }
                    }
                }
            }

            // --- PROJECTILES ---
            for (let i = 0; i < projectiles.length; i++) {
                let p = projectiles[i]; p.x += p.vx; p.vy += 0.15; p.y += p.vy; p.rot += p.vx > 0 ? 0.1 : -0.1;
                p.frameTimer++; if (p.frameTimer > 5) { p.frameTimer = 0; p.frameX = (p.frameX + 1) % pierreCols; }
                let stoneDestroyed = false;
                if (player.isAttacking && !player.isDead && !player.isHurt) {
                    const swordHitbox = { x: player.direction === 1 ? player.x + player.width : player.x - 40, y: player.y + 10, width: 40, height: 20 };
                    if (checkRectCollision(swordHitbox, p)) { projectiles.splice(i, 1); i--; stoneDestroyed = true; }
                }
                if (stoneDestroyed) continue;
                if (player.invulnerable === 0 && !player.isDead && checkRectCollision(p, player)) { applyKnockback(player, p.vx > 0 ? 1 : -1, 8); loseLife(); projectiles.splice(i, 1); i--; continue; }
                if (p.x < 0 || p.x > canvas.width || p.y > canvas.height) { projectiles.splice(i, 1); i--; }
            }

            checkPlatform(player); checkPlatform(boss);
            if (player.y > canvas.height && !player.isDead) loseLife();
        }

        function playerAttack() {
            if (boss.hp <= 0 || boss.invulnerable > 0) return;
            const hitbox = { x: player.direction === 1 ? player.x + player.width : player.x - 40, y: player.y + 10, width: 40, height: 20 };
            if (checkRectCollision(hitbox, boss)) {
                boss.invulnerable = 30; // Active l'indicateur de dégâts
                if (Math.random() < 0.2) { boss.vx = -boss.direction * 15; boss.state = "idle"; }
                else { applyKnockback(boss, player.direction, 12); boss.hp--; }
            }
        }

        function bossAttackMelee() {
            const hitbox = { x: boss.direction === 1 ? boss.x + boss.width : boss.x - 50, y: boss.y + 10, width: 50, height: 40 };
            if (player.invulnerable === 0 && !player.isDead && checkRectCollision(hitbox, player)) { applyKnockback(player, boss.direction, 10); loseLife(); }
        }

        function bossAttackRange() { projectiles.push({ x: boss.direction === 1 ? boss.x + boss.width : boss.x - 20, y: boss.y + 10, width: 25, height: 25, vx: boss.direction * 5.5, vy: -3, rot: 0, frameX: 0, frameTimer: 0 }); }
        function applyKnockback(target, direction, force) { target.vx = force * direction; target.vy = -6; target.isGrounded = false; }
        function checkRectCollision(r1, r2) { return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y; }
        function checkPlatform(ent) { if (ent.vy > 0 && ent.x < platform.x + platform.width && ent.x + ent.width > platform.x && ent.y + ent.height >= platform.y && ent.y + ent.height <= platform.y + ent.vy + 2) { ent.isGrounded = true; ent.vy = 0; ent.y = platform.y - ent.height; } }

        function draw() {
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#95a5a6"; ctx.fillRect(platform.x, platform.y, platform.width, platform.height);

            if (pierreSprite.complete && pierreSprite.naturalWidth > 0) {
                let sW = pierreSprite.naturalWidth / pierreCols; let sH = pierreSprite.naturalHeight / pierreRows;
                projectiles.forEach(p => { ctx.save(); ctx.translate(p.x + p.width / 2, p.y + p.height / 2); ctx.rotate(p.rot); ctx.drawImage(pierreSprite, p.frameX * sW, 0, sW, sH, -p.width / 2 - 10, -p.height / 2 - 10, p.width + 20, p.height + 20); ctx.restore(); });
            }

            // --- DESSIN BOSS ---
            if (boss.state === "dead" && bossMortSprite.complete) {
                let sW = bossMortSprite.naturalWidth / bossMortCols;
                let sH = bossMortSprite.naturalHeight;
                let dW = 110, dH = 110;
                let dX = boss.x - (dW - boss.width) / 2, dY = boss.y - (dH - boss.height) + BOSS_OFFSET_Y;
                ctx.save();
                if (boss.direction === -1) { ctx.translate(dX + dW / 2, dY + dH / 2); ctx.scale(-1, 1); ctx.drawImage(bossMortSprite, boss.frameX * sW, 0, sW, sH, -dW / 2, -dH / 2, dW, dH); }
                else { ctx.drawImage(bossMortSprite, boss.frameX * sW, 0, sW, sH, dX, dY, dW, dH); }
                ctx.restore();
            } else if (bossSprite.complete && boss.hp > 0) {
                let sW = bossSprite.naturalWidth / bossCols, sH = bossSprite.naturalHeight / bossRows;
                let dW = 100, dH = 100;
                let dX = boss.x - (dW - boss.width) / 2, dY = boss.y - (dH - boss.height) + BOSS_OFFSET_Y;
                ctx.save();
                if (boss.invulnerable > 0 && boss.invulnerable % 8 < 4) ctx.globalAlpha = 0.3;
                if (boss.direction === -1) { ctx.translate(dX + dW / 2, dY + dH / 2); ctx.scale(-1, 1); ctx.drawImage(bossSprite, boss.frameX * sW, boss.frameY * sH, sW, sH, -dW / 2, -dH / 2, dW, dH); }
                else { ctx.drawImage(bossSprite, boss.frameX * sW, boss.frameY * sH, sW, sH, dX, dY, dW, dH); }
                ctx.restore();
            }

            // --- DESSIN JOUEUR ---
            let curFile = (player.isHurt || player.isDead) ? playerDegatSprite : playerSprite;
            let curCols = (player.isHurt || player.isDead) ? playerDegatCols : playerCols;
            if (curFile.complete) {
                let sW = curFile.naturalWidth / curCols, sH = curFile.naturalHeight / 4;
                let dW = 80, dH = 80;
                let dX = player.x - (dW - player.width) / 2, dY = player.y - (dH - player.height) + PLAYER_OFFSET_Y;
                ctx.save();
                if (player.invulnerable > 0 && player.invulnerable % 8 < 4 && !player.isDead) ctx.globalAlpha = 0.3;
                if (player.direction === -1) { ctx.translate(dX + dW / 2, dY + dH / 2); ctx.scale(-1, 1); ctx.drawImage(curFile, player.frameX * sW, player.frameY * sH, sW, sH, -dW / 2, -dH / 2, dW, dH); }
                else { ctx.drawImage(curFile, player.frameX * sW, player.frameY * sH, sW, sH, dX, dY, dW, dH); }
                ctx.restore();
            }

            // UI
            ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.fillText("Vies :", 20, 35);
            for (let i = 0; i < 5; i++) { ctx.fillStyle = i < player.lives ? "#e74c3c" : "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.arc(95 + i * 22, 28, 8, 0, Math.PI * 2); ctx.fill(); }
            if (boss.hp > 0) {
                let bw = 300; ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(canvas.width - bw - 20, 20, bw, 20);
                ctx.fillStyle = "#c0392b"; ctx.fillRect(canvas.width - bw - 20, 20, bw * (boss.hp / boss.maxHp), 20);
                ctx.strokeStyle = "white"; ctx.strokeRect(canvas.width - bw - 20, 20, bw, 20);
                ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.fillText("BOSS", canvas.width - bw - 15, 15);
            }
            if (victory) { ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#f1c40f"; ctx.font = "bold 50px Arial"; ctx.fillText("BOSS VAINCU !", 310, 200); ctx.fillStyle = "white"; ctx.font = "20px Arial"; ctx.fillText("(Cliquez pour rejouer)", 400, 250); }
            if (gameOver) { ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "white"; ctx.font = "bold 50px Arial"; ctx.fillText("DÉFAITE...", 380, 200); ctx.fillStyle = "#e74c3c"; ctx.font = "20px Arial"; ctx.fillText("(Cliquez pour réessayer)", 390, 250); }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>

</html>
